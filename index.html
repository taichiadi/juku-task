<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>データ確認</title>
<style>
body { font-family: sans-serif; padding: 20px; background: #f1f5f9; }
.box { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid #e2e8f0; word-break: break-all; font-size: 12px; }
h2 { margin-bottom: 16px; }
</style>
</head>
<body>
<h2>🔍 ローカルデータ確認</h2>
<div id="output"></div>
<script>
const out = document.getElementById('output');
if (localStorage.length === 0) {
  out.innerHTML = '<div class="box">データが見つかりませんでした</div>';
} else {
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    const val = localStorage.getItem(key);
    out.innerHTML += `<div class="box"><b>${key}</b><br><br>${val}</div>`;
  }
}
</script>
</body>
</html>
